<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Heart Border Run</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  #heart {
    font-family: sans-serif; /* ✅ รองรับไทย */
    white-space: pre;
    font-size: 12px;
    line-height: 12px;
    letter-spacing: 1px;
    color: #ff4da6;
  }
</style>
</head>

<body>

<div id="heart"></div>

<script>
const text = "แดน💗หมวย "; // ✅ ใช้ตัวนี้ไม่เพี้ยน
const chars = text.split("");

let points = [];

// สร้างเส้นขอบหัวใจ (กลวง)
for (let t = 0; t < Math.PI * 2; t += 0.02) {
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = 13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

  x /= 18;
  y /= 18;

  points.push({x, y, t});
}

// เรียงตามเส้น (ให้วิ่งวน)
points.sort((a, b) => a.t - b.t);

let offset = 0;

function draw() {
  let output = "";

  for (let y = 1.2; y > -1.2; y -= 0.06) {
    let line = "";

    for (let x = -1.2; x < 1.2; x += 0.03) {

      let found = false;

      for (let i = 0; i < points.length; i++) {
        let p = points[i];

        if (
          Math.abs(p.x - x) < 0.03 &&
          Math.abs(p.y - y) < 0.03
        ) {
          let charIndex = (i + offset) % chars.length;
          line += chars[charIndex];
          found = true;
          break;
        }
      }

      if (!found) line += " ";
    }

    output += line + "\n";
  }

  document.getElementById("heart").innerText = output;

  offset++; // วิ่งตามเข็ม
}

// ความเร็ว (ปรับได้)
setInterval(draw, 80);
</script>

</body>
</html>
